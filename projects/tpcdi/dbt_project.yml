name: 'tpcdi'
version: '1.0.0'
config-version: 2

profile: 'tpcdi'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  tpcdi:
    +materialized: view
    incremental:
      FactHoldings:
        +materialized: table
      FactMarketHistroy:
        +materialized: table
      FactCashBalances:
        +materialized: table
      FactWatches:
        +materialized: table
      Prospect:
        +materialized: table
